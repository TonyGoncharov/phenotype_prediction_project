# biocypher_config.yaml

biocypher:
  offline: true
  debug: false
  # schema_config_path is supplied per species by src/build_graph.py — no default here
  cache_directory: .cache

neo4j:
  delimiter: '\t'
  array_delimiter: "|"
  skip_duplicate_nodes: true
  skip_bad_relationships: true
  node_labels_order: Ascending
  edge_labels_order: Leaves
  import_call_bin_prefix: /opt/homebrew/bin/