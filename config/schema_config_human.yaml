# schema_config_human.yaml
# BioCypher schema for the HUMAN gene-phenotype knowledge graph.
#
# Phenotypic features: MP top-level terms (shared with mouse graph for
# cross-species comparison).  Human genes connect to them directly
# (gene → mp_top) via a path collapsed from gene → HP → MP → MP top
# during the export pipeline.
#
# Ontological backbone: Biolink Model v3.2.1


# ═══════════════════════════════════════════════════════════════════
#  Nodes
# ═══════════════════════════════════════════════════════════════════

human gene:
  represented_as: node
  preferred_id: hgnc.symbol
  label_in_input: human gene
  is_a: gene
  properties:
    symbol: str
    organism: str

# Shared with mouse graph — same node IDs (MP:xxxxxxx) in both graphs
# enable direct cross-species comparison in Neo4j.
mp top term:
  represented_as: node
  preferred_id: mp
  label_in_input: mp top term
  is_a: phenotypic feature
  properties:
    mp_id: str
    name: str

go term:
  represented_as: node
  preferred_id: go
  label_in_input: go term
  is_a: ontology class
  properties:
    go_id: str
    namespace: str
    name: str

# BioGRID proteins — IDs use PROTEIN: prefix (e.g. PROTEIN:TP53).
# One protein node per human gene symbol; linked to its gene via
# "human gene encodes protein" and to other proteins via "human protein interacts with".
protein:
  represented_as: node
  preferred_id: hgnc.symbol
  label_in_input: protein
  is_a: gene product
  properties:
    gene_symbol: str
    organism: str

# GTEx tissues — IDs use GTEX: prefix (e.g. GTEX:Brain_Amygdala).
# is_a: gross anatomical structure maps to the Biolink anatomy hierarchy.
tissue:
  represented_as: node
  preferred_id: gtex
  label_in_input: tissue
  is_a: gross anatomical structure
  properties:
    name: str

# Uberon anatomical terms — IDs use UBERON: prefix (e.g. UBERON:0002048).
# Linked from GTEx tissue nodes via "tissue mapped to uberon" edges.
# is_a: gross anatomical structure anchors Uberon in the Biolink anatomy hierarchy.
uberon term:
  represented_as: node
  preferred_id: uberon
  label_in_input: uberon term
  is_a: gross anatomical structure
  properties:
    uberon_id:  str
    name:       str
    definition: str
    synonyms:   str[]


# ═══════════════════════════════════════════════════════════════════
#  Edges
# ═══════════════════════════════════════════════════════════════════

human gene has mp top term:
  represented_as: edge
  label_in_input: human gene has mp top term
  is_a: gene to phenotypic feature association
  source: human gene
  target: mp top term
  properties:
    derived: bool
    source_hp_ids: str[]
    min_hp_to_anchor_distance: int

human gene has go term:
  represented_as: edge
  label_in_input: human gene has go term
  is_a: association
  source: human gene
  target: go term
  properties:
    evidence_codes: str[]
    aspect: str

# GTEx expression edges.
# median_tpm stores the GTEx median TPM value that passed the threshold.
human gene expressed in tissue:
  represented_as: edge
  label_in_input: human gene expressed in tissue
  is_a: gene to expression site association
  source: human gene
  target: tissue
  properties:
    median_tpm: float

# Uberon: GTEx tissue → Uberon anatomical term (curated GTEx→Uberon mapping).
# gtex_tissue_name stores the human-readable GTEx tissue label for convenience.
tissue mapped to uberon:
  represented_as: edge
  label_in_input: tissue mapped to uberon
  is_a: association
  source: tissue
  target: uberon term
  properties:
    gtex_tissue_name: str

# BioGRID: gene → protein (1-to-1 for human, HGNC symbol-based).
human gene encodes protein:
  represented_as: edge
  label_in_input: human gene encodes protein
  is_a: gene to gene product relationship
  source: human gene
  target: protein

# BioGRID: physical protein-protein interactions (undirected, stored as directed A→B).
# experimental_systems / pubmed_ids are pipe-separated lists serialised as strings.
human protein interacts with:
  represented_as: edge
  label_in_input: human protein interacts with
  is_a: pairwise molecular interaction
  source: protein
  target: protein
  properties:
    experimental_systems:       str[]
    experimental_system_types:  str[]
    throughput:                 str
    pubmed_ids:                 str[]
    source_db:                  str
